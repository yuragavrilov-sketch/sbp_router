image:
  repository: harbor.online.tkbbank.ru/tkbpay/sbp_router   # TODO: must equal CI image path ($IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME); tag injected by CI
serviceAccount:
  create: true                   # chart creates a dedicated SA, bound to the Vault k8s-auth role
  name: sbp-router
imagePullSecrets:
  enabled: true
  name: test-adapters-ips        # namespace Harbor pull secret (the dedicated SA has none of its own)
vault:
  enabled: false
replicaCount: 1

# Internal service (GCSvc traffic comes from an in-cluster caller) — no external ingress.
ingress:
  enabled: false

ports:
  - containerPort: 8080
service:
  name: sbp-router               # callers reach http://sbp-router:8080/api/gcsvc
  port: 8080
  targetPort: 8080

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080
readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080

extraEnvs:
  - name: SPRING_PROFILES_ACTIVE
    value: test                  # sbp-router `test` profile (PAY_ENVIRONMENT=test, config-server on)
  # Enable the external config-data clients (application.yml defaults both to false so the service
  # also boots standalone). Without these the optional:vault:// / optional:configserver: imports
  # are silently skipped — no property source loads.
  - name: VAULT_ENABLED
    value: "true"
  - name: CONFIG_SERVER_ENABLED
    value: "true"
  # --- Vault: app reads secrets directly (Spring Cloud Vault, Kubernetes auth) ---
  - name: SPRING_CLOUD_VAULT_URI
    value: "https://vault.online.tkbbank.ru"
  - name: SPRING_CLOUD_VAULT_AUTHENTICATION
    value: "KUBERNETES"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_KUBERNETES_PATH
    value: "payadmin-test"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_ROLE
    value: "sbp-router"
  # --- Config Server (payconfig-server, Basic auth) ---
  - name: CONFIG_SERVER_URL
    value: "http://payconfig-server:8080"
  - name: CONFIG_CLIENT_USERNAME
    value: "configadmin"
  # TEMP diagnostics: verbose Config Server client (non-secret config) to see fetch/401. Remove
  # once startup is verified. Vault stays at INFO to avoid logging secret bodies.
  - name: LOG_CONFIG_CLIENT
    value: "DEBUG"
  # Non-secret runtime config (Kafka, infosrv upstream, dynamic routing / manifest) comes from
  # Config Server — config-repo branch `test`, file `sbp-router.yml`. Not set here (an env var
  # would override Config Server).
  # Secrets are read directly from Vault (see application.yml spring.cloud.vault.kv contexts):
  #   pay/test/sbp-router-config-client-password -> spring.cloud.config.password
  #   pay/test/sbp-router-internal-admin-key     -> sbp-router.manifest.admin-key
  # No k8s Secret / secretKeyRef.
