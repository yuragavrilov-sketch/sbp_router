image:
  repository: harbor.online.tkbbank.ru/tkbpay/sbp_router   # TODO: must equal CI image path ($IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME); tag injected by CI
serviceAccount:
  create: true                   # chart creates a dedicated SA, bound to the Vault k8s-auth role
  name: sbp-router
imagePullSecrets:
  enabled: true
  name: test-adapters-ips        # namespace Harbor pull secret (the dedicated SA has none of its own)
vault:
  enabled: false
replicaCount: 1

# Internal service (GCSvc traffic comes from an in-cluster caller) — no external ingress.
ingress:
  enabled: false

ports:
  - containerPort: 8080
service:
  name: sbp-router               # callers reach http://sbp-router:8080/api/gcsvc
  port: 8080
  targetPort: 8080

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080
readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080

extraEnvs:
  - name: SPRING_PROFILES_ACTIVE
    value: test                  # sbp-router `test` profile
  # pay.environment drives the Vault KV contexts (pay/<env>/sbp-router-*) and the Config Server
  # label. The config-data imports resolve VERY early (before the active profile is applied), so
  # this MUST come from an env var — relying on the profile would leave it at the `local` default
  # and Vault/Config Server would hit pay/local/... (403 from the test-scoped policy).
  - name: PAY_ENVIRONMENT
    value: test
  # Enable the external config-data clients (application.yml defaults both to false so the service
  # also boots standalone). Without these the optional:vault:// / optional:configserver: imports
  # are silently skipped — no property source loads.
  - name: VAULT_ENABLED
    value: "true"
  - name: CONFIG_SERVER_ENABLED
    value: "true"
  # --- Vault: app reads secrets directly (Spring Cloud Vault, Kubernetes auth) ---
  - name: SPRING_CLOUD_VAULT_URI
    value: "https://vault.online.tkbbank.ru"
  - name: SPRING_CLOUD_VAULT_AUTHENTICATION
    value: "KUBERNETES"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_KUBERNETES_PATH
    value: "payadmin-test"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_ROLE
    value: "sbp-router"
  # Vault provides ONLY the application secret (internal-admin-key). The config-client password is
  # a bootstrap credential and comes from a k8s Secret instead (see CONFIG_CLIENT_PASSWORD below).
  - name: VAULT_KV_CONTEXTS
    value: "test/sbp-router-internal-admin-key"
  # --- Config Server (payconfig-server, Basic auth) ---
  - name: CONFIG_SERVER_URL
    value: "http://payconfig-server:8080"
  - name: CONFIG_CLIENT_USERNAME
    value: "configadmin"
  # Bootstrap credential: the password Config Server expects. Read from the SAME k8s Secret/key that
  # payconfig-server validates against (single source of truth — the two cannot drift). Provided as
  # an env var (system-environment, highest precedence, present before any config-data import) so
  # the Basic-auth call to Config Server is authenticated from the first request. A Vault-imported
  # password was NOT reliably visible to the configserver import in this Spring Boot 4 / Cloud 2025
  # config-data stack (it called Config Server unauthenticated -> 401), regardless of import order.
  - name: CONFIG_CLIENT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: payconfig-server-secret
        key: CONFIG_SERVER_PASSWORD
  # Non-secret runtime config (Kafka, infosrv upstream, dynamic routing / manifest) comes from
  # Config Server — config-repo branch `test`, file `sbp-router.yml`. Not set here (an env var
  # would override Config Server).
  # Secret split: application secret in Vault, bootstrap config-server credential in a k8s Secret:
  #   pay/test/sbp-router-internal-admin-key (Vault) -> sbp-router.manifest.admin-key
  #   payconfig-server-secret/CONFIG_SERVER_PASSWORD -> spring.cloud.config.password
