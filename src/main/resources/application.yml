server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

pay:
  environment: ${PAY_ENVIRONMENT:local}

spring:
  application:
    name: sbp-router
  profiles:
    default: local
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import:
      - optional:configserver:${CONFIG_SERVER_URL:http://pay-payconfig-server:8080}
      - optional:vault://
  cloud:
    config:
      enabled: ${CONFIG_SERVER_ENABLED:false}
      label: ${CONFIG_SERVER_LABEL:${pay.environment}}
    vault:
      enabled: ${VAULT_ENABLED:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,routing-manifest
  metrics:
    tags:
      application: sbp-router

sbp-router:
  extraction-rules:
    ReqAuthPay:
      routing-fields:
        - name: terminalName
          parent: PayProfile
          key: Tran.TermName
        - name: rcvTspId
          parent: PayProfile
          key: RcvTSPId
        - name: sbpOperation
          parent: PayProfile
          key: SbpOperation
        - name: sbpOperType
          parent: PayProfile
          key: SbpOperType
      extra-fields:
        - name: senderAccount
          parent: PayProfile
          key: SndAccountNum
        - name: amount
          path: /Document/GCSvc/Payment/ReqAuthPay/Funds/Amount
    ReqNoticePay:
      routing-fields:
        - name: terminalName
          parent: AdditionInfo
          key: Tran.TermName
        - name: rcvTspId
          parent: AdditionInfo
          key: RcvTSPId
        - name: sbpOperation
          parent: AdditionInfo
          key: SbpOperation
        - name: sbpOperType
          parent: AdditionInfo
          key: SbpOperType
        - name: state
          path: /Document/GCSvc/Payment/ReqNoticePay/State
      extra-fields:
        - name: bankOperId
          path: /Document/GCSvc/Payment/ReqNoticePay/BankOperId

  terminals:
    c2b-terminal:
      field-name: rcvTspId
    b2c-terminal:
      field-name: terminalName
      tkb-pay-prefix: "Pay"
    tkb-pay-list:
      - MB0000700543
      - MB0000004185

  routing:
    tkb-pay-enabled: false

  upstreams:
    infosrv:
      url: http://infosrv.bank.local/api/gcsvc
      timeout: 30s
      retry:
        max-attempts: 2
        backoff: 500ms
    stub-verification:
      url: http://localhost:${server.port}/stub/verification
    stub-c2bqrd-verification:
      url: http://localhost:${server.port}/stub/c2bqrd-verification
    stub-connector:
      url: http://localhost:${server.port}/stub/connector

  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic: ${KAFKA_TOPIC:sbp-router-traffic}

  manifest:
    enabled: ${DYNAMIC_ROUTING_ENABLED:false}
    base-url: ${SBP_ROUTER_MANAGEMENT_URL:http://sbp-router-management:8087}
    admin-key: ${INTERNAL_ADMIN_API_KEY:}
    poll-interval: ${MANIFEST_POLL_INTERVAL:30s}
    initial-delay: ${MANIFEST_INITIAL_DELAY:2s}
    event-topic: ${KAFKA_MANIFEST_TOPIC:sbp-router-manifest}
