server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

pay:
  environment: ${PAY_ENVIRONMENT:local}

spring:
  application:
    name: sbp-router
  profiles:
    default: local
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import:
      # Vault supplies the internal-admin-key. The Config Server config-client PASSWORD is provided
      # as the CONFIG_CLIENT_PASSWORD env var (from a k8s Secret) so it is present before Config
      # Server is contacted: in Spring Boot 4 / Cloud 2025 config-data did NOT reliably expose a
      # Vault-imported password to the configserver import (it ran unauthenticated -> 401),
      # regardless of import order or splitting into separate documents. The env var sits in the
      # system-environment source (highest precedence, available pre-import). Vault still lists the
      # config-client-password context as a standalone fallback when the env var is absent.
      - optional:vault://
      - optional:configserver:${CONFIG_SERVER_URL:http://pay-payconfig-server:8080}
  cloud:
    config:
      enabled: ${CONFIG_SERVER_ENABLED:false}
      label: ${CONFIG_SERVER_LABEL:${pay.environment}}
      username: ${CONFIG_CLIENT_USERNAME:}
      password: ${CONFIG_CLIENT_PASSWORD:}
    vault:
      # The flat proxy has no application secret; the Vault import is kept (optional) for
      # configuration-standard compliance and to fetch the Config Server client password if present.
      enabled: ${VAULT_ENABLED:false}
      kv:
        backend: ${VAULT_KV_BACKEND:pay}
        default-context: ""
        application-name: ${VAULT_KV_CONTEXTS:${pay.environment}/sbp-router}
        profiles: []

# Default to INFO (safe). Verbose levels are opt-in via env for short-lived troubleshooting only.
# NOTE: org.springframework.vault at DEBUG can log Vault response bodies / tokens — enable
# LOG_VAULT=DEBUG only briefly and review logs for secret leakage before leaving it on.
logging:
  level:
    org.springframework.cloud.config: ${LOG_CONFIG_CLIENT:INFO}
    org.springframework.cloud.vault: ${LOG_VAULT:INFO}
    org.springframework.vault: ${LOG_VAULT:INFO}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: sbp-router

sbp-router:
  # Flat pass-through proxy over a pool of backends. All traffic goes to the active group;
  # round-robin within it, with per-backend circuit-breaking on transport failures.
  active-group: ${SBP_ACTIVE_GROUP:default}
  groups:
    default:
      backends:
        - ${SBP_BACKEND_URL:http://infosrv.bank.local/api/gcsvc}
  timeout: ${SBP_BACKEND_TIMEOUT:30s}
  failover:
    max-attempts: ${SBP_FAILOVER_MAX:2}
  circuit-breaker:
    failure-threshold: ${SBP_CB_THRESHOLD:3}
    ban-duration: ${SBP_CB_BAN:30s}

  # Admin API guard for /admin/** (GET/POST /admin/active-group). Blank key = disabled (local/dev).
  # In test/prod set SBP_ADMIN_API_KEY (or reuse the contour's INTERNAL_ADMIN_API_KEY) from a
  # k8s Secret / Vault. The admin endpoints then require this key in the configured header.
  admin:
    api-key: ${SBP_ADMIN_API_KEY:${INTERNAL_ADMIN_API_KEY:}}
    header-name: ${SBP_ADMIN_HEADER:X-Internal-Admin-Key}

  # Cross-replica active-group sync: POST /admin/active-group broadcasts via this compacted topic;
  # every pod consumes it (unique group.id) and converges. Off = single-instance in-memory switch.
  active-group-sync:
    enabled: ${SBP_ACTIVE_GROUP_SYNC_ENABLED:false}
    topic: ${SBP_ACTIVE_GROUP_TOPIC:sbp-router-active-group}

  # Fleet heartbeat: each pod publishes presence + metrics for the management fleet view.
  heartbeat:
    enabled: ${SBP_HEARTBEAT_ENABLED:false}
    topic: ${SBP_HEARTBEAT_TOPIC:sbp-router-heartbeat}
    interval: ${SBP_HEARTBEAT_INTERVAL:15s}

  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic: ${KAFKA_TOPIC:sbp-router-traffic}
