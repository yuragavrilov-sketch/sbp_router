server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  level:
    org.springframework.web.reactive.function.server.RequestPredicates: TRACE
    org.springframework.web.reactive.result.method: DEBUG
    org.springframework.http.server.reactive: DEBUG
    reactor.netty.http.server: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: sbp-router

sbp-router:
  extraction-rules:
    ReqAuthPay:
      routing-fields:
        - name: terminalName
          parent: PayProfile
          key: Tran.TermName
        - name: rcvTspId
          parent: PayProfile
          key: RcvTSPId
        - name: sbpOperation
          parent: PayProfile
          key: SbpOperation
        - name: sbpOperType
          parent: PayProfile
          key: SbpOperType
      extra-fields:
        - name: senderAccount
          parent: PayProfile
          key: SndAccountNum
        - name: amount
          path: /Document/GCSvc/Payment/ReqAuthPay/Funds/Amount
    ReqNoticePay:
      routing-fields:
        - name: terminalName
          parent: AdditionInfo
          key: Tran.TermName
        - name: rcvTspId
          parent: AdditionInfo
          key: RcvTSPId
        - name: sbpOperation
          parent: AdditionInfo
          key: SbpOperation
        - name: sbpOperType
          parent: AdditionInfo
          key: SbpOperType
        - name: state
          path: /Document/GCSvc/Payment/ReqNoticePay/State
      extra-fields:
        - name: bankOperId
          path: /Document/GCSvc/Payment/ReqNoticePay/BankOperId

  terminals:
    c2b-terminal:
      field-name: rcvTspId
    b2c-terminal:
      field-name: terminalName
      tkb-pay-prefix: "Pay"
    tkb-pay-list:
      - MB0000700543
      - MB0000004185

  routing:
    tkb-pay-enabled: false

  admin:
    token: ${SBP_ADMIN_TOKEN:change-me-in-prod}
  history:
    capacity: 1000
  config:
    override-path: config/runtime-overrides.json

  upstreams:
    infosrv:
      url: http://infosrv.bank.local/api/gcsvc
      timeout: 30s
      retry:
        max-attempts: 2
        backoff: 500ms
    stub-verification:
      url: http://localhost:${server.port}/stub/verification
    stub-c2bqrd-verification:
      url: http://localhost:${server.port}/stub/c2bqrd-verification
    stub-connector:
      url: http://localhost:${server.port}/stub/connector
