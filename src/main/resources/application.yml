server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

pay:
  environment: ${PAY_ENVIRONMENT:local}

spring:
  application:
    name: sbp-router
  profiles:
    default: local
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import:
      # vault before configserver: the config-client password is read from Vault and must be
      # resolved before contacting the (Basic-auth) Config Server.
      - optional:vault://
      - optional:configserver:${CONFIG_SERVER_URL:http://pay-payconfig-server:8080}
  cloud:
    config:
      enabled: ${CONFIG_SERVER_ENABLED:false}
      label: ${CONFIG_SERVER_LABEL:${pay.environment}}
      username: ${CONFIG_CLIENT_USERNAME:}
      password: ${CONFIG_CLIENT_PASSWORD:}
    vault:
      enabled: ${VAULT_ENABLED:false}
      kv:
        backend: ${VAULT_KV_BACKEND:pay}
        default-context: ""
        application-name: ${VAULT_KV_CONTEXTS:${pay.environment}/${spring.application.name}-config-client-password,${pay.environment}/${spring.application.name}-internal-admin-key}
        profiles: []

# Default to INFO (safe). Verbose levels are opt-in via env for short-lived troubleshooting only.
# NOTE: org.springframework.vault at DEBUG can log Vault response bodies / tokens — enable
# LOG_VAULT=DEBUG only briefly and review logs for secret leakage before leaving it on.
logging:
  level:
    org.springframework.cloud.config: ${LOG_CONFIG_CLIENT:INFO}
    org.springframework.cloud.vault: ${LOG_VAULT:INFO}
    org.springframework.vault: ${LOG_VAULT:INFO}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,routing-manifest
  metrics:
    tags:
      application: sbp-router

sbp-router:
  extraction-rules:
    ReqAuthPay:
      routing-fields:
        - name: terminalName
          parent: PayProfile
          key: Tran.TermName
        - name: rcvTspId
          parent: PayProfile
          key: RcvTSPId
        - name: sbpOperation
          parent: PayProfile
          key: SbpOperation
        - name: sbpOperType
          parent: PayProfile
          key: SbpOperType
      extra-fields:
        - name: senderAccount
          parent: PayProfile
          key: SndAccountNum
        - name: amount
          path: /Document/GCSvc/Payment/ReqAuthPay/Funds/Amount
    ReqNoticePay:
      routing-fields:
        - name: terminalName
          parent: AdditionInfo
          key: Tran.TermName
        - name: rcvTspId
          parent: AdditionInfo
          key: RcvTSPId
        - name: sbpOperation
          parent: AdditionInfo
          key: SbpOperation
        - name: sbpOperType
          parent: AdditionInfo
          key: SbpOperType
        - name: state
          path: /Document/GCSvc/Payment/ReqNoticePay/State
      extra-fields:
        - name: bankOperId
          path: /Document/GCSvc/Payment/ReqNoticePay/BankOperId

  terminals:
    c2b-terminal:
      field-name: rcvTspId
    b2c-terminal:
      field-name: terminalName
      tkb-pay-prefix: "Pay"
    tkb-pay-list:
      - MB0000700543
      - MB0000004185

  routing:
    tkb-pay-enabled: false

  upstreams:
    infosrv:
      url: http://infosrv.bank.local/api/gcsvc
      timeout: 30s
      retry:
        max-attempts: 2
        backoff: 500ms
    stub-verification:
      url: http://localhost:${server.port}/stub/verification
    stub-c2bqrd-verification:
      url: http://localhost:${server.port}/stub/c2bqrd-verification
    stub-connector:
      url: http://localhost:${server.port}/stub/connector

  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic: ${KAFKA_TOPIC:sbp-router-traffic}

  manifest:
    enabled: ${DYNAMIC_ROUTING_ENABLED:false}
    base-url: ${SBP_ROUTER_MANAGEMENT_URL:http://sbp-router-management:8087}
    admin-key: ${INTERNAL_ADMIN_API_KEY:}
    poll-interval: ${MANIFEST_POLL_INTERVAL:30s}
    initial-delay: ${MANIFEST_INITIAL_DELAY:2s}
    event-topic: ${KAFKA_MANIFEST_TOPIC:sbp-router-manifest}
