spring:
  cloud:
    config:
      enabled: false
    vault:
      enabled: false

sbp-router:
  # Integration tests override sbp-router.groups.default.backends via @DynamicPropertySource.
  active-group: default
  groups:
    default:
      backends:
        - http://localhost:9099/api/gcsvc
  timeout: 5s
  failover:
    max-attempts: 2
  circuit-breaker:
    failure-threshold: 3
    ban-duration: 5s
