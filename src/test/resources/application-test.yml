spring:
  cloud:
    config:
      enabled: false
    vault:
      enabled: false

sbp-router:
  # Integration tests override sbp-router.backend.url via @DynamicPropertySource (WireMock).
  # This default keeps the context loadable for context-only tests; it points nowhere reachable.
  backend:
    url: http://localhost:9999/api/gcsvc
    timeout: 5s
    retry:
      max-attempts: 1
      backoff: 100ms
